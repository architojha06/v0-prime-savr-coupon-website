<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrimeSavr Admin</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020817;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #020617;
        border-radius: 1rem;
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 2rem;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.7);
      }
      .title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .subtitle {
        font-size: 0.95rem;
        color: #9ca3af;
        margin-bottom: 1.5rem;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.12);
        color: #7dd3fc;
        border: 1px solid rgba(56, 189, 248, 0.35);
        margin-bottom: 1rem;
      }
      .badge-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
      }
      .label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.35rem;
        color: #e5e7eb;
      }
      .input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.85);
        color: #e5e7eb;
        font-size: 0.9rem;
        outline: none;
      }
      .input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px #38bdf8;
      }
      .field {
        margin-bottom: 0.9rem;
      }
      .button {
        margin-top: 0.75rem;
        width: 100%;
        padding: 0.7rem 1rem;
        border-radius: 0.6rem;
        border: none;
        background: linear-gradient(135deg, #0ea5e9, #6366f1);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: transform 0.08s ease, box-shadow 0.08s ease,
          filter 0.08s ease;
        box-shadow: 0 18px 35px rgba(37, 99, 235, 0.35);
      }
      .button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
        box-shadow: 0 22px 40px rgba(37, 99, 235, 0.45);
      }
      .button:active {
        transform: translateY(0);
        box-shadow: 0 14px 28px rgba(37, 99, 235, 0.28);
      }
      .hint {
        margin-top: 0.75rem;
        font-size: 0.75rem;
        color: #9ca3af;
      }
      .hint code {
        background: rgba(15, 23, 42, 0.9);
        padding: 0.1rem 0.35rem;
        border-radius: 0.4rem;
        border: 1px solid rgba(55, 65, 81, 0.8);
        font-size: 0.7rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <span class="badge-dot"></span>
        PrimeSavr Admin Portal
      </div>
      <h1 class="title">Admin access</h1>
      <p class="subtitle">
        This is a simple placeholder admin page. Wire it up to your Next.js
        admin routes or Supabase dashboard as needed.
      </p>

      <div class="field">
        <label class="label" for="email">Admin email</label>
        <input
          id="email"
          class="input"
          type="email"
          placeholder="you@example.com"
        />
      </div>
      <div class="field">
        <label class="label" for="password">Password</label>
        <input
          id="password"
          class="input"
          type="password"
          placeholder="••••••••"
        />
      </div>

      <button class="button" type="button">Sign in (placeholder)</button>

      <p class="hint">
        This static file lives at
        <code>/admin.html</code>. Replace it with a real admin experience when
        you are ready.
      </p>
    </main>
  </body>
</html>
